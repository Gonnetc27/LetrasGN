<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>letrasJT</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="borde b-top" data-dir="t"></div>
    <div class="borde b-bottom" data-dir="b"></div>
    <div class="borde b-left" data-dir="l"></div>
    <div class="borde b-right" data-dir="r"></div>
    <div class="borde b-top-left" data-dir="tl"></div>
    <div class="borde b-top-right" data-dir="tr"></div>
    <div class="borde b-bottom-left" data-dir="bl"></div>
    <div class="borde b-bottom-right" data-dir="br"></div>

    <div class="controles top">
      <div class="grupo-btn">
        <div class="btn mover" title="Mover">
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="5 9 2 12 5 15"></polyline>
            <polyline points="9 5 12 2 15 5"></polyline>
            <polyline points="19 9 22 12 19 15"></polyline>
            <polyline points="9 19 12 22 15 19"></polyline>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <line x1="12" y1="2" x2="12" y2="22"></line>
          </svg>
        </div>
        <div class="btn recargar" title="Recargar letra">
          <svg viewBox="0 0 24 24" width="13" height="13" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </div>
        <div class="btn full-letras" title="Ver toda la letra">
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </div>
      </div>

      <div class="info-cancion-container">
        <span class="info-cancion-texto">Esperando...</span>
      </div>

      <button class="btn cerrar" onclick="window.close()" title="Cerrar">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="letras-container">
      Escuchando...
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
